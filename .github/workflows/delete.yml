name: Workflow and Cache Cleanup

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        type: choice
        description: '清理的工作流名称'
        required: true
        default: 'Build All OnePlus Kernels'
        options:
          - Build All OnePlus Kernels
          - CAll Build Start UP
          - Build TEST
          - Build TEST2
      cache_mode:
        type: choice
        description: '缓存清理类型'
        required: false
        default: 'none'
        options:
          - none
          - all
          - ccache
          - apt-cache
      count:
        description: '最多访问的运行次数'
        required: false
        default: '20'
      delete_failed:
        description: '删除指定工作流失败的运行记录？'
        required: false
        type: boolean
        default: true
      delete_success:
        description: '删除指定工作流成功的运行记录？'
        required: false
        type: boolean
        default: false
      delete_cancelled:
        description: '删除指定工作流取消的运行记录？'
        required: false
        type: boolean
        default: false
      reverse_order:
        description: '从旧到新开始清理？'
        required: false
        type: boolean
        default: false
      cancel_all:
        description: '是否一键取消指定工作流的所有运行？'
        required: false
        type: boolean
        default: false

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ inputs.cancel_all
     || inputs.delete_failed
     || inputs.delete_success
     || inputs.delete_cancelled }}
    steps:
      - name: 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: 认证 GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: 清理指定工作流运行记录
        env:
          REPO: ${{ github.repository }}
          COUNT: ${{ inputs.count }}
          DELETE_FAILED: ${{ inputs.delete_failed }}
          DELETE_SUCCESS: ${{ inputs.delete_success }}
          DELETE_CANCELLED: ${{ inputs.delete_cancelled }}
          REVERSE_ORDER: ${{ inputs.reverse_order }}
          CANCEL_ALL: ${{ inputs.cancel_all }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          TMP_DIR=$(mktemp -d)
          trap "rm -rf $TMP_DIR" EXIT

          echo "查找工作流 \"$WORKFLOW_NAME\" 的 ID..."
          gh api repos/$REPO/actions/workflows > "$TMP_DIR/workflows.json" || {
            echo "❌ 无法获取 workflows"
            exit 1
          }
          if ! jq -e '.workflows | type=="array"' "$TMP_DIR/workflows.json" >/dev/null 2>&1; then
            echo "❌ workflows API 返回非预期格式"
            exit 1
          fi
          WORKFLOW_ID=$(jq -r ".workflows[] | select(.name == \"$WORKFLOW_NAME\") | .id" "$TMP_DIR/workflows.json")
          if [ -z "$WORKFLOW_ID" ]; then
            echo "未找到工作流 \"$WORKFLOW_NAME\"，退出。"
            exit 1
          fi
          echo "找到工作流 ID: $WORKFLOW_ID"

          echo "开始分页获取所有运行记录..."
          PER_PAGE=100
          PAGE=1
          echo "[]" > "$TMP_DIR/all_runs.json"
          while true; do
            gh api "repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=$PER_PAGE&page=$PAGE" \
              > "$TMP_DIR/page_resp.json" 2>/dev/null || {
              echo "⚠️ 第 $PAGE 页请求失败，停止分页"
              break
            }
            if ! jq -e '.workflow_runs | type=="array"' "$TMP_DIR/page_resp.json" >/dev/null 2>&1; then
              echo "⚠️ runs API 返回非 JSON，停止分页"
              break
            fi
            COUNT_THIS_PAGE=$(jq '.workflow_runs | length' "$TMP_DIR/page_resp.json")
            if [ "$COUNT_THIS_PAGE" -eq 0 ]; then break; fi
            jq -s '.[0] + .[1]' "$TMP_DIR/all_runs.json" <(jq '.workflow_runs' "$TMP_DIR/page_resp.json") \
              > "$TMP_DIR/all_runs_new.json"
            mv "$TMP_DIR/all_runs_new.json" "$TMP_DIR/all_runs.json"
            PAGE=$((PAGE + 1))
          done
          echo "共获取到 $(jq 'length' "$TMP_DIR/all_runs.json") 条运行记录。"

          if [[ "$CANCEL_ALL" == "true" ]]; then
            echo "开始取消进行中或排队中的运行..."
            CANCEL_COUNT=0
            jq -c '.[] | select((.status == "in_progress") or (.status == "queued"))' \
              "$TMP_DIR/all_runs.json" > "$TMP_DIR/to_cancel.json"
            while IFS= read -r run; do
              ID=$(echo "$run" | jq -r '.id')
              [[ "$ID" == "$CURRENT_RUN_ID" ]] && continue
              echo "取消运行 ID: $ID"
              gh api -X POST "repos/$REPO/actions/runs/$ID/cancel" \
                && CANCEL_COUNT=$((CANCEL_COUNT + 1)) || echo "取消失败: $ID"
            done < "$TMP_DIR/to_cancel.json"
            echo "已取消 $CANCEL_COUNT 条运行。"
          fi

          echo "开始处理删除逻辑..."
          if [[ "$REVERSE_ORDER" == "true" ]]; then
            jq 'sort_by(.run_started_at)' "$TMP_DIR/all_runs.json" > "$TMP_DIR/sorted_runs.json"
          else
            jq 'sort_by(.run_started_at) | reverse' "$TMP_DIR/all_runs.json" > "$TMP_DIR/sorted_runs.json"
          fi
          jq ".[0:${COUNT}]" "$TMP_DIR/sorted_runs.json" > "$TMP_DIR/to_delete.json"

          jq -c '.[]' "$TMP_DIR/to_delete.json" > "$TMP_DIR/to_delete_lines.txt"
          while IFS= read -r run; do
            ID=$(echo "$run" | jq -r '.id')
            STATUS=$(echo "$run" | jq -r '.conclusion')
            STATE=$(echo "$run" | jq -r '.status')

            [[ "$STATE" == "in_progress" || "$STATE" == "queued" ]] && continue
            [[ "$STATUS" == "failure" && "$DELETE_FAILED" != "true" ]] && continue
            [[ "$STATUS" == "success" && "$DELETE_SUCCESS" != "true" ]] && continue
            [[ "$STATUS" == "cancelled" && "$DELETE_CANCELLED" != "true" ]] && continue

            echo "删除运行记录 ID: $ID (conclusion=$STATUS)"
            gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "删除失败: $ID"
          done < "$TMP_DIR/to_delete_lines.txt"

          echo "清理本工作流运行记录（排除当前运行）..."
          SELF_WORKFLOW_ID=$(jq -r '.workflows[] | select(.name == "Workflow and Cache Cleanup") | .id' \
            "$TMP_DIR/workflows.json")
          if [ -n "$SELF_WORKFLOW_ID" ]; then
            SELF_PAGE=1
            while true; do
              gh api "repos/$REPO/actions/workflows/$SELF_WORKFLOW_ID/runs?per_page=50&page=$SELF_PAGE" \
                > "$TMP_DIR/self_page.json" 2>/dev/null || break
              if ! jq -e '.workflow_runs | type=="array"' "$TMP_DIR/self_page.json" >/dev/null 2>&1; then break; fi
              SELF_COUNT=$(jq '.workflow_runs | length' "$TMP_DIR/self_page.json")
              if [ "$SELF_COUNT" -eq 0 ]; then break; fi
              jq -c '.workflow_runs[]' "$TMP_DIR/self_page.json" > "$TMP_DIR/self_runs_lines.txt"
              while IFS= read -r run; do
                ID=$(echo "$run" | jq -r '.id')
                [[ "$ID" == "$CURRENT_RUN_ID" ]] && continue
                echo "删除本工作流运行记录 ID: $ID"
                gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "删除失败: $ID"
              done < "$TMP_DIR/self_runs_lines.txt"
              SELF_PAGE=$((SELF_PAGE + 1))
            done
          fi

  clean-caches:
    runs-on: ubuntu-latest
    if: ${{ inputs.cache_mode != 'none' }}
    permissions:
      actions: write
    steps:
      - name: 根据模式清理缓存
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            const mode = process.env.CACHE_MODE || '${{ inputs.cache_mode }}';
            console.log(`🔹 当前缓存清理模式: ${mode}`);

            let totalDeleted = 0;
            let totalFound = 0;
            let page = 1;

            while (true) {
              const res = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page
              });

              const caches = res.data.actions_caches;
              if (!caches || caches.length === 0) break;

              for (const cache of caches) {
                const key = cache.key;
                let matched = false;

                switch (mode) {
                  case 'all':
                    matched = true;
                    break;
                  case 'ccache':
                    matched = key.startsWith('ccache-');
                    break;
                  case 'apt-cache':
                    matched = key.includes('apt-cache') || key.includes('apt');
                    break;
                  default:
                    matched = false;
                }

                if (matched) {
                  totalFound++;
                  console.log(`删除缓存: ${key}`);
                  try {
                    await github.rest.actions.deleteActionsCacheById({
                      owner,
                      repo,
                      cache_id: cache.id
                    });
                    totalDeleted++;
                  } catch (err) {
                    console.log(`删除缓存失败: ${key}`);
                  }
                }
              }

              if (caches.length < 100) break;
              page++;
            }

            if (totalFound === 0) {
              console.log("没有找到符合条件的缓存。");
            } else {
              console.log(`共找到 ${totalFound} 个缓存，成功删除 ${totalDeleted} 个。`);
            }